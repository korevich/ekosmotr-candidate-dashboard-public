<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <link rel="icon" href="data:,">
  <title>Экосмотр — защищенная витрина кандидатов</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --ink: #171826;
      --muted: #667085;
      --line: #d8deea;
      --accent: #2457d6;
      --danger: #b9382f;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(125deg, #171826 0%, #252b52 48%, #71354b 100%);
      color: var(--ink);
      padding: 24px;
    }
    main {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(23,24,38,.22);
      padding: 24px;
    }
    .eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      color: #2457d6;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    p {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }
    form {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 13px;
      font-weight: 800;
      color: #243240;
    }
    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }
    .note {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Экосмотр / защищенный доступ</p>
    <h1>Полная витрина кандидатов</h1>
    <p>Страница зашифрована. Полные данные появятся только после ввода пароля.</p>
    <form id="unlockForm">
      <label class="visually-hidden">
        Логин
        <input id="username" type="text" autocomplete="username" value="ekosmotr">
      </label>
      <label>
        Пароль
        <input id="password" type="password" autocomplete="current-password" autofocus>
      </label>
      <button type="submit">Открыть витрину</button>
      <div class="status" id="status"></div>
    </form>
    <p class="note">Поисковикам отдано noindex/nofollow. Без пароля HTML витрины не хранится на странице в открытом виде.</p>
  </main>

    function fromBase64url(value) {
      const base64 = value.replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(value.length / 4) * 4, '=');
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const material = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }

    async function decryptDashboard(password) {
      const salt = fromBase64url(PAYLOAD.salt);
      const iv = fromBase64url(PAYLOAD.iv);
      const ciphertext = fromBase64url(PAYLOAD.data);
      const tag = fromBase64url(PAYLOAD.tag);
      const combined = new Uint8Array(ciphertext.length + tag.length);
      combined.set(ciphertext, 0);
      combined.set(tag, ciphertext.length);
      const key = await deriveKey(password, salt, PAYLOAD.iterations);
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
      return new TextDecoder().decode(decrypted);
    }

    document.getElementById('unlockForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const status = document.getElementById('status');
      const password = document.getElementById('password').value;
      status.textContent = 'Проверяю пароль...';
      try {
        const dashboardHtml = await decryptDashboard(password);
        document.open();
        document.write(dashboardHtml);
        document.close();
      } catch (error) {
        status.textContent = 'Пароль не подошел или данные повреждены.';
      }
    });
  </script>
